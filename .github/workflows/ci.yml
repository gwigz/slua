name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run fmt:check
      - run: bun run lint
      - run: bun run generate
      - run: bun run build
      - run: bun run test
